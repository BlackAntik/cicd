services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 10

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: warehouse-test-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_SEEDS: cassandra
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - bash
      - -c
      - |
        sed "s/'dc1': 3/'dc1': 1/g" /migrations/init.cql | cqlsh cassandra
    restart: on-failure

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic warehouse-events --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic warehouse-events-dlq --partitions 1 --replication-factor 1
      "

  schema-init:
    build:
      context: .
      dockerfile: producer/Dockerfile
    depends_on:
      schema-registry:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    command: ["python", "register_schemas.py"]
    restart: on-failure

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KAFKA_TOPIC: warehouse-events
      KAFKA_DLQ_TOPIC: warehouse-events-dlq
      KAFKA_GROUP_ID: warehouse-test-consumer
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: warehouse
      METRICS_PORT: 8000
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode()==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  unit-tests:
    build:
      context: .
      dockerfile: tests/Dockerfile.test
    command: >
      pytest tests/unit/ -v --tb=short
        --junit-xml=/reports/unit-tests.xml
    volumes:
      - ./reports:/reports

  integration-tests:
    build:
      context: .
      dockerfile: tests/Dockerfile.test
    depends_on:
      consumer:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    command: >
      pytest tests/integration/ -v --tb=short
        --timeout=120
        --junit-xml=/reports/integration-tests.xml
    volumes:
      - ./reports:/reports
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: warehouse
      CONSUMER_URL: http://consumer:8000
      KAFKA_TOPIC: warehouse-events
      EVENT_PROPAGATION_TIMEOUT: "15"

  e2e-tests:
    build:
      context: .
      dockerfile: tests/Dockerfile.test
    depends_on:
      consumer:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    command: >
      pytest tests/e2e/ -v --tb=short
        --timeout=180
        --junit-xml=/reports/e2e-tests.xml
    volumes:
      - ./reports:/reports
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: warehouse
      CONSUMER_URL: http://consumer:8000
      KAFKA_TOPIC: warehouse-events
      KAFKA_DLQ_TOPIC: warehouse-events-dlq
      EVENT_PROPAGATION_TIMEOUT: "15"

volumes: {}
